version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Dhivya@2006
      MYSQL_DATABASE: contact_manager
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - my-network

  backend:
    build: ./backend
    container_name: backend
    restart: always
    depends_on:
      - mysql
    environment:
      PORT: 5000
      DB_HOST: mysql-db
      DB_USER: root
      DB_PASSWORD: Dhivya@2006
      DB_NAME: contact_manager
      JWT_SECRET: mysecretkey
    ports:
      - "5000:5000"
    networks:
      - my-network

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - my-network

volumes:
  mysql-data:

networks:
  my-network: